# Use GLX for best performance
backend = "glx"
glx-no-stencil = true
glx-no-rebind-pixmap = true
vsync = true

# General
fading = true
fade-delta = 4
fade-in-step = 0.03
fade-out-step = 0.03
detect-client-opacity = true

# Shadows
shadow = true
shadow-radius = 12
shadow-offset-x = -12
shadow-offset-y = -12
shadow-opacity = 0.35
shadow-exclude = [
    "class_g = 'i3-frame'",
    "class_g = 'i3bar'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
]

# Transparency & blur
inactive-opacity = 0.85
active-opacity = 1.0
frame-opacity = 0.85
blur-method = "kernel"
blur-size = 7
blur-background = true
blur-background-frame = true

opacity-rule = [
    "90:class_g = 'kitty'",
    "90:class_g = 'Alacritty'"
]

# Exclude docks and panels
opacity-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'"
]


